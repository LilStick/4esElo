server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SPA : toute route inconnue retombe sur index.html (sinon un refresh sur
    # /classement ou /player/xxx donnerait un 404 - le routing est cote client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
